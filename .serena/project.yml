project_name: "portal-ai-server"

languages:
  - python

encoding: "utf-8"

ignore_all_files_in_gitignore: true

ignored_paths:
  - "**/node_modules/**"
  - "**/__pycache__/**"
  - "**/.venv/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/qdrant-data/**"
  - "**/.pytest_cache/**"
  - "**/htmlcov/**"
  - "**/*.egg-info/**"

read_only: false

excluded_tools: []
included_optional_tools: []
fixed_tools: []

base_modes:
default_modes:

initial_prompt: |
  Portal.ai 패션 추천 AI 서버 (FastAPI). 검색 + 리파인 파이프라인.
  app/ (API + pipeline + scoring + providers + models), scripts/ (배치)
  Tech: Python 3.13, FastAPI, LiteLLM, Qdrant, Pydantic v2, uv

symbol_info_budget:
language_backend:
